<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    .a-enter-vr-button, .a-enter-ar-button, .a-orientation-modal, .a-enter-vr-modal {
      display: none !important;
    }
  </style>
  <script>
    // Componente personalizado para persistencia
    AFRAME.registerComponent('persist-marker', {
      init: function () {
        this.visible = false;
        this.timeout = null;
        this.el.addEventListener('markerFound', () => {
          clearTimeout(this.timeout);
          this.el.object3D.visible = true;
          this.visible = true;
        });
        this.el.addEventListener('markerLost', () => {
          // Esperar 500 ms antes de ocultar
          this.timeout = setTimeout(() => {
            this.el.object3D.visible = false;
            this.visible = false;
          }, 500);
        });
      }
    });
  </script>
</head>
<body style="margin:0; overflow:hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    <!-- Añade el componente persist-marker al marcador -->
    <a-marker preset="hiro" persist-marker>
      <a-box position="0 0.5 0" material="color: yellow;" scale="0.5 0.5 0.5"></a-box>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
