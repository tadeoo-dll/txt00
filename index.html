<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    .a-enter-vr-button, .a-enter-ar-button, .a-orientation-modal, .a-enter-vr-modal {
      display: none !important;
    }
  </style>
  <script>
    AFRAME.registerComponent('persist-marker', {
      init: function () {
        var self = this;
        var timeout;
        self.el.addEventListener('markerFound', function () {
          clearTimeout(timeout);
          self.el.object3D.visible = true;
        });
        self.el.addEventListener('markerLost', function () {
          // Ahora espera 1000 ms (1 segundo) antes de ocultar
          timeout = setTimeout(function () {
            self.el.object3D.visible = false;
          }, 1000);
        });
      }
    });
  </script>
</head>
<body style="margin:0; overflow:hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    <!-- Cambiado a preset="kanji" -->
    <a-marker preset="kanji" persist-marker>
      <a-box position="0 0.5 0" material="color: yellow;" scale="0.5 0.5 0.5"></a-box>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
