
<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    .a-enter-vr-button, .a-enter-ar-button, .a-orientation-modal, .a-enter-vr-modal {
      display: none !important;
    }
    /* Botón flotante */
    #color-btn {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      padding: 15px 25px;
      font-size: 20px;
      background: #ff5500;
      color: white;
      border: none;
      border-radius: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 1px;
    }
    #color-btn:active {
      background: #cc4400;
    }
  </style>
  <script>
    // Persistencia
    AFRAME.registerComponent('persist-marker', {
      init: function () {
        var self = this;
        var timeout;
        self.el.addEventListener('markerFound', function () {
          clearTimeout(timeout);
          self.el.object3D.visible = true;
        });
        self.el.addEventListener('markerLost', function () {
          timeout = setTimeout(function () {
            self.el.object3D.visible = false;
          }, 1000);
        });
      }
    });

    // Función global para cambiar color (llamada desde el botón)
    function cambiarColorAleatorio() {
      var cubo = document.querySelector('#cubo-interactivo');
      if (cubo) {
        var randomColor = '#' + Math.floor(Math.random() * 16777215).toString(16);
        cubo.setAttribute('material', 'color', randomColor);
      }
    }

    // Rotación continua usando el componente animation de A-Frame (se aplica al cubo directamente)
  </script>
</head>
<body style="margin:0; overflow:hidden;">
  <!-- Botón HTML encima de la escena -->
  <button id="color-btn" onclick="cambiarColorAleatorio()">🎨 Cambiar color</button>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    <a-marker preset="kanji" persist-marker>
      <!-- Cubo con id, rotación continua y material inicial -->
      <a-box 
        id="cubo-interactivo"
        position="0 0.5 0" 
        material="color: yellow;" 
        scale="0.5 0.5 0.5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"
      ></a-box>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
