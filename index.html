
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    .a-enter-vr-button, .a-enter-ar-button, .a-orientation-modal, .a-enter-vr-modal {
      display: none !important;
    }

    /* Botón flotante (oculto al principio) */
    #action-btn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      padding: 14px 28px;
      font-size: 18px;
      background: #ff5500;
      color: white;
      border: none;
      border-radius: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      cursor: pointer;
      font-weight: bold;
      display: none; /* Se muestra solo cuando el marcador está activo */
    }
    #action-btn:active {
      background: #cc4400;
    }
  </style>

  <script>
    // ---------------------------------------------------
    // 1. Persistencia del marcador (1 segundo)
    // ---------------------------------------------------
    AFRAME.registerComponent('persist-marker', {
      init: function () {
        var self = this;
        var timeout;
        self.el.addEventListener('markerFound', function () {
          clearTimeout(timeout);
          self.el.object3D.visible = true;
        });
        self.el.addEventListener('markerLost', function () {
          timeout = setTimeout(function () {
            self.el.object3D.visible = false;
          }, 1000);
        });
      }
    });

    // ---------------------------------------------------
    // 2. Animación al tocar el cubo (escala + color)
    // ---------------------------------------------------
    AFRAME.registerComponent('tap-animate', {
      init: function () {
        var el = this.el;
        el.addEventListener('click', function () {
          // Pequeña animación de "pulso"
          el.setAttribute('animation__scale', {
            property: 'scale',
            to: '0.85 0.85 0.85',
            dur: 150,
            easing: 'easeOutQuad',
            dir: 'alternate',
            loop: 1
          });
          // Cambiar a un color aleatorio
          var randomColor = '#' + Math.floor(Math.random() * 16777215).toString(16);
          el.setAttribute('material', 'color', randomColor);
        });
      }
    });

    // ---------------------------------------------------
    // 3. Control del botón HTML (aparece/desaparece con el marcador)
    // ---------------------------------------------------
    window.onload = function () {
      var marker = document.querySelector('#marcador-principal');
      var btn = document.getElementById('action-btn');

      if (marker && btn) {
        marker.addEventListener('markerFound', function () {
          btn.style.display = 'block';
        });
        marker.addEventListener('markerLost', function () {
          btn.style.display = 'none';
        });
      }

      // Acción del botón: misma animación que el toque en el cubo
      btn.addEventListener('click', function () {
        var cubo = document.querySelector('#cubo-magico');
        if (cubo) {
          // Disparar manualmente un evento 'click' o replicar la animación
          cubo.emit('click'); // Esto activa el listener del componente tap-animate
        }
      });
    };
  </script>
</head>
<body style="margin:0; overflow:hidden;">
  <!-- Botón alternativo -->
  <button id="action-btn">✨ Animar cubo</button>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    <!-- Marcador kanji con persistencia y una ID para el control del botón -->
    <a-marker preset="kanji" id="marcador-principal" persist-marker>
      <!-- Cubo más grande y con área de toque generosa -->
      <a-box 
        id="cubo-magico"
        position="0 0.6 0"
        width="1" height="1" depth="1"
        material="color: yellow; metalness: 0.3; roughness: 0.7"
        scale="0.7 0.7 0.7"
        tap-animate
      >
        <!-- Zona invisible extra para facilitar el toque (escala 1.3 veces mayor) -->
        <a-box 
          position="0 0 0"
          width="1" height="1" depth="1"
          scale="1.3 1.3 1.3"
          material="visible: false"
          class="clickable"
        ></a-box>
      </a-box>
    </a-marker>

    <!-- Cámara con cursor para que los toques generen eventos click en objetos 3D -->
    <a-entity camera>
      <a-cursor 
        fuse="false"
        rayOrigin="mouse"
        raycaster="objects: .clickable; far: 20"
      ></a-cursor>
    </a-entity>
  </a-scene>
</body>
</html>
