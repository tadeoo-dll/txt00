<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    .a-enter-vr-button, .a-enter-ar-button, .a-orientation-modal, .a-enter-vr-modal {
      display: none !important;
    }
  </style>
  <script>
    // Persistencia mejorada
    AFRAME.registerComponent('persist-marker', {
      init: function () {
        var self = this;
        var timeout;
        self.el.addEventListener('markerFound', function () {
          clearTimeout(timeout);
          self.el.object3D.visible = true;
        });
        self.el.addEventListener('markerLost', function () {
          timeout = setTimeout(function () {
            self.el.object3D.visible = false;
          }, 1000);
        });
      }
    });

    // Componente para cambio de color al clic
    AFRAME.registerComponent('change-color-on-click', {
      init: function () {
        var el = this.el;
        el.addEventListener('click', function () {
          var randomColor = '#' + Math.floor(Math.random() * 16777215).toString(16);
          el.setAttribute('material', 'color', randomColor);
        });
      }
    });
  </script>
</head>
<body style="margin:0; overflow:hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    <a-marker preset="kanji" persist-marker>
      <!-- Cubo con interacción -->
      <a-box 
        position="0 0.5 0" 
        material="color: yellow;" 
        scale="0.5 0.5 0.5"
        change-color-on-click
      ></a-box>
      <!-- Texto indicativo (sale 0.3 unidades arriba del cubo) -->
      <a-text 
        value="Tócame!" 
        position="0 1 0" 
        align="center" 
        color="white" 
        scale="0.8 0.8 0.8"
        look-at="[camera]"
      ></a-text>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
